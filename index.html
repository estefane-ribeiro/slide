<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slide - curso JavaScript</title>
    <script type="module" src="./js/script.js" defer></script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="slide-wrapper">
      <ul class="slide">
        <li>
          <img src="./imgs/foto1.jpg" alt="Imagem de uma raposa" />
        </li>
        <li>
          <img src="./imgs/foto2.jpg" alt="Imagem de um esquilo" />
        </li>
        <li>
          <img src="./imgs/foto3.jpg" alt="Imagem de um urso" />
        </li>
        <li>
          <img src="./imgs/foto4.jpg" alt="Imagem de um lobo" />
        </li>
        <li>
          <img src="./imgs/foto5.jpg" alt="Imagem de um macaco" />
        </li>
        <li>
          <img src="./imgs/foto6.jpg" alt="Imagem de um leão" />
        </li>
      </ul>
    </div>
    <div class="arrow-nav">
      <button class="prev">Prev</button>
      <button class="next">Next</button>
    </div>
  </body>
</html>
